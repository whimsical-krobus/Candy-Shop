  <main class="container" id="details-page">
    <section class="product-details flex container--px">
      <button class="back" id="back-btn">
        <img class="back__icon" src="img/icon_arrow_back.svg" alt="Back" />
        Back
      </button>

      <div class="product flex">
        <img class="product-details__img" id="product-img" src="/" alt="" />

        <div>
          <h1 class="product-details__title" id="product-title"></h1>

          <div class="description">
            <h2 class="description__heading">Product details</h2>
            <p class="description__text" id="product-description"></p>
          </div>

          <div class="ingredients">
            <h2 class="ingredients__heading">Ingredients</h2>
            <ul class="ingredients__list">
              <li>
                <b>Vegan-friendly</b> 🌱 - no animal stuff here, just pure
                candy joy
              </li>
              <li>May contain traces of <b>nuts</b></li>
              <li>
                Made in Hogwarts - handcrafted with love and a sprinkle of
                chaos
              </li>
              <li>
                <b>Warning:</b> Eating this may cause sugar-fueled giggles,
                sticky fingers, and spontaneous happiness
              </li>
            </ul>
          </div>

          <div class="product-actions flex">
            <div class="quantity flex flex-ai-c flex-jc-sb">
              <button class="quantity__btn" id="quantity-btn-dec">-</button>
              <p class="quantity__text" id="quantity-text">01</p>
              <button class="quantity__btn" id="quantity-btn-inc">+</button>
            </div>

            <div class="product-actions__cta flex">
              <button id="add-to-cart-btn" class="product-actions__add cart-btn cart-btn--secondary">
                Add to cart
                <img src="img/icon_ShoppingCartSimple.svg" alt="Shopping cart" />
              </button>
              <img class="favorite" id="fav-icon" src="" alt=""></img>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>
