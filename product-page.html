<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candy Avenue</title>
  <link rel="stylesheet" href="/src/scss/style.scss" />
  <!-- google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Lobster&display=swap&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet" />
</head>

<body>
  
  <!-- INCLUDE HEADER -->
 <div id="header"></div>

  <main class="container" id="product-page">
    <section class="shop-hero" id="top">
      <div class="shop-hero__intro container--px">
        <h1 class="shop-hero__intro-title" id="product-page-title">
          All products
        </h1>
        <p class="shop-hero__intro-text">
          Explore our full candy collection all in one place. Customize your
          experience by choosing the categories you're craving.
        </p>
      </div>

    </section>

    <section class="shop flex container--px">
      <div class="shop__items" id="item-grid"></div>
    </section>

    <section class="page-end flex flex-jc-c flex-ai-c container--px">
      <h2 class="page-end__title">
        You've reached the bottom of the candy jar :(
      </h2>

      <a href="#top" class="page-end__link">
        Back to top
        <img class="page-end__link-img" src="/img/arrow_up.png" alt="Arrow up" />
      </a>
    </section>
  </main>

  <!-- INCLUDE FOOTER -->
  <div id="footer"></div>

  <!-- INCLUDE SCRIPT LINK -->
  <script type="module" src="/src/ts/main.ts"></script>
 </body>

</html>
