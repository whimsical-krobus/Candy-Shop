<header class="header">

  <div class="overlay has-fade"></div>

  <div class="mini-cart" id="mini-cart">
    <h3>Products</h3>

    <ul id="mini-cart-list"></ul>

    <p>Sub-total: <span id="mini-cart-subtotal">0</span> SEK</p>
    <p>Total: <span id="mini-cart-total">0</span> SEK</p>

    <a href="checkout.html">
      <button class="mini-cart__checkout-btn">PROCEED TO CHECKOUT</button>
    </a>
  </div>

  <!-- Mobile header -->
  <nav class="mobile-nav container container--pall flex flex-jc-sb flex-ai-c hide-for-desktop">
    <a href="index.html" class="header__logo">
      <img src="/img/logo.svg" alt="Candy Avenue" />
    </a>

    <a href="product-page.html?favorites=true" class="header__icon"><img src="/img/icon_Favorites.svg"
        alt="Favorites" /></a>

    <div class="cart-badge-container">
      <img class="header__icon cart-trigger" src="/img/icon_ShoppingCartSimple.svg" alt="Shopping Cart" />
      <span class="cart-badge"></span>
    </div>

    <a id="btn-hamburger" href="#" class="header__toggle">
      <span></span>
      <span></span>
      <span></span>
    </a>

    <div class="header__menu has-fade">
      <a href="product-page.html">All</a>
      <a href="product-page.html?isNew=true">New</a>
      <a href="product-page.html?category=lollipops">Lollipops</a>
      <a href="product-page.html?category=chocolate">Chocolate</a>
      <a href="product-page.html?category=gummies">Gummies</a>
      <a href="product-page.html?category=licorice">Licorice</a>
    </div>
  </nav>

  <!-- Desktop header -->
  <div class="header__desktop hide-for-mobile">
    <div class="header-box container">
      <a href="index.html" class="logo">
        <img src="/img/logo.svg" alt="Candy Avenue" />
      </a>

      <form id="search-form" class="flex">
        <div class="search-wrapper">
          <input type="text" placeholder="Search for goodies..." />
          <button type="submit" class="search-btn">
            <img src="/img/icon_search.svg" alt="Search" />
          </button>
        </div>
      </form>

      <div id="icon-box">
        <a href="product-page.html?favorites=true"><img src="/img/icon_Favorites.svg" alt="Favorites" /></a>

        <div class="cart-badge-container">
          <img class="cart-trigger" src="/img/icon_ShoppingCartSimple.svg" alt="Shopping Cart" />
          <span class="cart-badge"></span>
        </div>
      </div>
    </div>

    <nav class="nav__desktop">
      <div class="nav-list">
        <a href="product-page.html">All</a>
        <a href="product-page.html?isNew=true">New</a>
        <a href="product-page.html?category=lollipops">Lollipops</a>
        <a href="product-page.html?category=chocolate">Chocolate</a>
        <a href="product-page.html?category=gummies">Gummies</a>
        <a href="product-page.html?category=licorice">Licorice</a>
      </div>
    </nav>
  </div>
</header>
